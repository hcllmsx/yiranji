name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: |
          cd src-tauri
          cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Rename bundle to ASCII filename
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $files = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe"
          foreach ($f in $files) {
            $newName = "yiranji_${{ github.ref_name }}_x64-setup.exe"
            Rename-Item -Path $f.FullName -NewName $newName
            Write-Host "Renamed: $($f.Name) -> $newName"
          }

      - name: Create release and upload
        uses: softprops/action-gh-release@v2
        with:
          name: '以苒纪 ${{ github.ref_name }}'
          body: '见下方 Assets 下载安装包。'
          files: src-tauri/target/release/bundle/nsis/yiranji_${{ github.ref_name }}_x64-setup.exe
